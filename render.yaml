services:
  - type: web
    name: rena-backend
    env: go
    buildCommand: cd rena/backend && go build -o server
    startCommand: cd rena/backend && ./server
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        value: https://tgdpaueqsjakpucpozsb.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: your-service-role-key
