name: Deploy Go Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'rena/backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Build
        working-directory: rena/backend
        run: go build -o bin/server

      - name: Deploy to Render
        uses: jakejarvis/render-deploy-action@master
        with:
          render-service-name: ${{ secrets.RENDER_SERVICE_NAME }}
          render-api-key: ${{ secrets.RENDER_API_KEY }}
          # Optional: specify a specific branch to deploy
          # branch: main
