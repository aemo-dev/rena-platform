name: Deploy Go Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'rena/backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Build
        working-directory: rena/backend
        run: go build -o server

      - name: Deploy to Railway
        uses: ethomson/railway-deploy-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_NAME }}
          environment: production
          ref: main
