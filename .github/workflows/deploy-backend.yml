name: Deploy Go Backend

on:
  push:
    branches: [main]
    paths:
      - 'rena/backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: false  # Disable for now - configure your deployment target below

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Build
        working-directory: rena/backend
        run: go build -o bin/server

      # Option 1: Deploy to Fly.io
      # - Install flyctl: https://fly.io/docs/hands-on/install-flyctl/
      # - Add FLY_API_TOKEN as secret
      # - Uncomment below:
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions@master
      #   with:
      #     args: 'deploy --app your-app-name'
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Option 2: Deploy to Railway
      # - Add RAILWAY_TOKEN as secret
      # - Use: https://github.com/railwayapp/github-action

      # Option 3: Deploy to Render
      # - Use: https://github.com/jakejarvis/render-deploy-action

      # Option 4: Build and upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend binary
          path: rena/backend/bin/server
